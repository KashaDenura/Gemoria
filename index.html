<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemoria</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container" id="menu">

    <h1>💎 GEMORIA 💎</h1>

    <p class="studio">
        by KSN Studio
    </p>

    <button id="playBtn">
        ▶ PLAY
    </button>

</div>

<div id="game" style="display:none;">
  <div id="comboText"></div>

    <h2>💎 GEMORIA</h2>

    <div class="topbar">

        <div class="panel">
            ⭐ Score
            <br>
            <span id="score">0</span>
        </div>

        <div class="panel">
            🎯 Target
            <br>
            <span id="target">500</span>
        </div>

        <div class="panel">
            ❤ Moves
            <br>
            <span id="moves">25</span>
        </div>

    </div>

    <div id="board"></div>

</div>

    <script src="js/gems.js"></script>
<script src="js/board.js"></script>
<script src="js/match.js"></script>
<script src="js/gravity.js"></script>
<script src="js/score.js"></script>
<script src="js/effects.js"></script>
<script src="js/script.js"></script>

</body>
</html>
